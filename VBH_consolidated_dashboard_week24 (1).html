<style>
:root{--ink:#211d1a;--ink2:#5c554e;--ink3:#8a8179;--line:#e7e2da;--bg:#f4f1ec;--card:#fffdfa;--ochre:#b5791b;--ochre-soft:#f4e7cf;--green:#3f7d3f;--green-bg:#e7f1e3;--red:#b2402f;--red-bg:#f6e4df;--amber:#9a6b12;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,sans-serif;color:var(--ink);background:var(--bg);line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:1180px;margin:0 auto;padding:0 20px 60px}
header.top{background:var(--ink);color:#f4f1ec;padding:18px 0;margin-bottom:22px}
.top .wrap{display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap;padding-bottom:0}
.brand{font-family:'Space Grotesk';font-weight:700;font-size:19px;letter-spacing:.01em}
.brand span{color:var(--ochre)}
.top .meta{font-size:13px;color:#bcb3a7;font-family:'Space Grotesk';font-weight:500}
.controls{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;margin-bottom:18px}
.ctl label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin-bottom:5px;font-weight:600}
select{font-family:inherit;font-size:14px;padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:var(--card);color:var(--ink);min-width:150px;cursor:pointer}
.seg-toggle{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--card)}
.seg-toggle button{font-family:inherit;font-size:14px;padding:9px 16px;border:0;background:transparent;color:var(--ink2);cursor:pointer}
.seg-toggle button.on{background:var(--ink);color:#f4f1ec;font-weight:600}
.verdict{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--ochre);border-radius:0 11px 11px 0;padding:15px 18px;margin-bottom:20px;font-size:15.5px}
.verdict b{font-weight:600}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(178px,1fr));gap:13px;margin-bottom:24px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:15px 16px}
.kpi .k-lab{font-size:12px;color:var(--ink3);font-weight:600;display:flex;align-items:center;gap:7px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.kpi .k-val{font-family:'Space Grotesk';font-weight:600;font-size:26px;margin:7px 0 9px;font-variant-numeric:tabular-nums}
.kpi .k-cmp{font-size:12.5px;display:flex;justify-content:space-between;color:var(--ink2)}
.kpi .k-cmp .d{font-weight:600;font-variant-numeric:tabular-nums}
.up{color:var(--green)} .down{color:var(--red)} .neu{color:var(--ink3)}
.panels{display:grid;grid-template-columns:1.5fr 1fr;gap:18px;margin-bottom:22px}
@media(max-width:820px){.panels{grid-template-columns:1fr}}
.panel{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:17px 19px;margin-bottom:22px}
.panel h3{font-family:'Space Grotesk';font-size:15px;font-weight:600;margin-bottom:3px}
.panel .sub{font-size:12px;color:var(--ink3);margin-bottom:14px}
canvas{width:100%;height:230px;display:block}
.legend{display:flex;gap:16px;font-size:12px;color:var(--ink2);margin-top:9px}
.legend i{display:inline-block;width:14px;height:3px;vertical-align:middle;margin-right:6px;border-radius:2px}
.bench-note{font-size:11.5px;color:var(--ink3);margin-top:8px;line-height:1.45}
.focus{background:var(--ochre-soft);border:1px solid #e7d3a8;border-radius:13px;padding:16px 19px;margin-bottom:22px}
.focus .ft{font-family:'Space Grotesk';font-weight:600;font-size:14.5px;color:var(--amber);display:flex;align-items:center;gap:8px;margin-bottom:9px}
.foot{font-size:11.5px;color:var(--ink3);text-align:center;margin-top:26px;line-height:1.6}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:right;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink3);font-weight:600;padding:7px 9px;border-bottom:1px solid var(--line);cursor:pointer;white-space:nowrap;user-select:none}
.tbl th:first-child{text-align:left}
.tbl th.sorted{color:var(--ink)}
.tbl td{text-align:right;padding:8px 9px;border-bottom:0.5px solid var(--line);font-variant-numeric:tabular-nums;white-space:nowrap}
.tbl td:first-child{text-align:left;font-weight:600;white-space:normal}
.tbl tr:hover td{background:var(--bg)}
.seg-pill{display:inline-block;font-size:10px;font-weight:600;padding:1px 6px;border-radius:5px;color:var(--ink2);background:var(--bg);border:1px solid var(--line);margin-left:6px;vertical-align:middle}
.stat{display:inline-block;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:6px;text-transform:uppercase;letter-spacing:.03em}
.stat.b{background:var(--green-bg);color:var(--green)} .stat.k{background:var(--ochre-soft);color:var(--amber)} .stat.o{background:var(--red-bg);color:var(--red)}
.flag{font-size:11px;margin-left:5px;cursor:help}
.tfoot td{font-weight:700;border-top:2px solid var(--ink);border-bottom:0;background:var(--bg)}
.tfoot td:first-child{font-family:'Space Grotesk'}
.al-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}
.al h4{font-size:12.5px;font-weight:600;margin-bottom:9px;display:flex;align-items:center;gap:7px}
.al ul{list-style:none;display:flex;flex-direction:column;gap:7px}
.al li{font-size:13px;display:flex;justify-content:space-between;gap:10px;padding-bottom:6px;border-bottom:0.5px solid #e7d3a8}
.al li .nm b{font-weight:600}
.al li .nm span{color:var(--amber);font-size:11.5px;display:block}
.al li .vv{font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap;text-align:right}
.segcards{display:grid;grid-template-columns:1fr;gap:10px}
.segcard{border:1px solid var(--line);border-radius:11px;padding:12px 14px;background:var(--bg)}
.segcard .st{font-family:'Space Grotesk';font-weight:600;font-size:14px;display:flex;justify-content:space-between;align-items:baseline}
.segcard .st .pc{font-size:12px;font-weight:600}
.segcard .ss{font-size:11px;color:var(--ink3);margin:1px 0 8px}
.segcard .row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;color:var(--ink2)}
.segcard .row b{font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums}
</style>

function renderTrend(){
  const list=active(); const cv=document.getElementById('trend'); const dpr=window.devicePixelRatio||1;
  const W=cv.clientWidth,H=230; cv.width=W*dpr;cv.height=H*dpr; const x=cv.getContext('2d'); x.scale(dpr,dpr); x.clearRect(0,0,W,H);
  const wks=[]; for(let w=1;w<=WEEK;w++) wks.push(w);
  const a=wks.map(w=>list.reduce((t,s)=>t+((s.serie[w]&&s.serie[w][0])||0),0));
  const b=wks.map(w=>list.reduce((t,s)=>t+((s.serie[w]&&s.serie[w][1])||0),0));
  const all=a.concat(b); const mx=Math.max(...all)*1.06, mn=Math.min(...all)*0.9;
  const pad={l:54,r:8,t:10,b:20}; const px=i=>pad.l+(W-pad.l-pad.r)*(i/(wks.length-1)); const py=v=>pad.t+(H-pad.t-pad.b)*(1-(v-mn)/(mx-mn));
  x.strokeStyle='#efe9e0';x.lineWidth=1;x.fillStyle='#8a8179';x.font='10px Inter';
  for(let g=0;g<=3;g++){const v=mn+(mx-mn)*g/3;const yy=py(v);x.beginPath();x.moveTo(pad.l,yy);x.lineTo(W-pad.r,yy);x.stroke();x.fillText('\u20ac'+Math.round(v/1000)+'k',4,yy+3);}
  [['#c7bfb3',b,1.6],['#b5791b',a,2.6]].forEach(arr0=>{const col=arr0[0],arr=arr0[1],lw=arr0[2];
    x.strokeStyle=col;x.lineWidth=lw;x.beginPath();let st=false;
    arr.forEach((v,i)=>{const X=px(i),Y=py(v);if(!st){x.moveTo(X,Y);st=true;}else x.lineTo(X,Y);});x.stroke();});
  x.fillStyle='#8a8179'; const step=Math.max(1,Math.round(wks.length/8));

}

  document.getElementById('tblNote').innerHTML='Resultaat = omzet \u2212 inkoop \u2212 loonkosten (week: exacte Dyflexis-loonkosten; YTD: geschat met personeelsratio 2025). Excl. huur en overige overhead. Inkoop %, derving en begroting komen uit QV week 23 tot de QV van week '+WEEK+' beschikbaar is.';
}
render();
window.addEventListener('resize',renderTrend);
</script>
