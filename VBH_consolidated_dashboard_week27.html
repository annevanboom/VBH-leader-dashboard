<style>

body{font-family:Inter,system-ui,sans-serif;color:var(--ink);background:var(--bg);line-height:1.5;-webkit-font-smoothing:antialiased}

header.top{background:var(--ink);color:var(--paper);padding:18px 0;margin-bottom:22px}

.controls{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;margin-bottom:18px}
.ctl label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin-bottom:5px;font-weight:600}
select{font-family:inherit;font-size:14px;padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:var(--card);color:var(--ink);min-width:150px;cursor:pointer}
.seg-toggle{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--card)}
.seg-toggle button{font-family:inherit;font-size:14px;padding:9px 16px;border:0;background:transparent;color:var(--ink2);cursor:pointer}
.seg-toggle button.on{background:var(--ink);color:var(--paper);font-weight:600}
.verdict{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--ochre);border-radius:0 11px 11px 0;padding:15px 18px;margin-bottom:20px;font-size:15.5px}
.verdict b{font-weight:600}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(178px,1fr));gap:13px;margin-bottom:24px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:15px 16px}

.kpi .k-cmp .d{font-weight:600;font-variant-numeric:tabular-nums}
.up{color:var(--green)} .down{color:var(--red)} .neu{color:var(--ink3)}
.panels{display:grid;grid-template-columns:1.5fr 1fr;gap:18px;margin-bottom:22px}

.panel{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:17px 19px;margin-bottom:22px}

.bench-note{font-size:11.5px;color:var(--ink3);margin-top:8px;line-height:1.45}
.focus{background:var(--pink-soft);border:1px solid var(--pink);border-radius:13px;padding:16px 19px;margin-bottom:22px}
.focus .ft{font-family:'Space Grotesk';font-weight:600;font-size:14.5px;color:var(--ink);display:flex;align-items:center;gap:8px;margin-bottom:9px}
.foot{font-size:11.5px;color:var(--ink3);text-align:center;margin-top:26px;line-height:1.6}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:right;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink3);font-weight:600;padding:7px 9px;border-bottom:1px solid var(--line);cursor:pointer;white-space:nowrap;user-select:none}
.tbl th:first-child{text-align:left}
.tbl th.sorted{color:var(--ink)}
.tbl td{text-align:right;padding:8px 9px;border-bottom:0.5px solid var(--line);font-variant-numeric:tabular-nums;white-space:nowrap}
.tbl td:first-child{text-align:left;font-weight:600;white-space:normal}
.tbl tr:hover td{background:var(--pink-soft)}
.seg-pill{display:inline-block;font-size:10px;font-weight:600;padding:1px 6px;border-radius:5px;color:var(--ink2);background:var(--bg);border:1px solid var(--line);margin-left:6px;vertical-align:middle}

.al li{font-size:13px;display:flex;justify-content:space-between;gap:10px;padding-bottom:6px;border-bottom:0.5px solid var(--pink)}
.al li .nm b{font-weight:600}
.al li .nm span{color:var(--amber);font-size:11.5px;display:block}
.al li .vv{font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap;text-align:right}
.segcards{display:grid;grid-template-columns:1fr;gap:10px}
.segcard{border:1px solid var(--line);border-radius:11px;padding:12px 14px;background:var(--bg)}

.segcard .st .pc{font-size:12px;font-weight:600}
.segcard .ss{font-size:11px;color:var(--ink3);margin:1px 0 8px}
.segcard .row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;color:var(--ink2)}
.segcard .row b{font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums}

function seasonW(zomerdip){var w={};for(var wk=WEEK+1;wk<=52;wk++){var x=1.0;
  if(wk>=27&&wk<=39)x=1+zomerdip/100;

function fwd(s){

  for(var w=1;w<=WEEK;w++){var p=s.serie[w]||[0,0];ytdReal+=p[0]||0;ytdLy+=p[1]||0;}
  var budget=s.budget2026.omzet;

  var budWeek={}, lyWeek={}, projWeek={}, remLy=0;

  var mx=Math.max.apply(null,allv)*1.06, mn=Math.min.apply(null,allv)*0.9;
  var pad={l:54,r:8,t:10,b:20}; var px=function(i){return pad.l+(W-pad.l-pad.r)*(i/(wks.length-1));}; var py=function(v){return pad.t+(H-pad.t-pad.b)*(1-(v-mn)/(mx-mn));};
  x.strokeStyle='#e6dad2';x.lineWidth=1;x.fillStyle='#9a8778';x.font='10px Inter';
  for(var gg=0;gg<=3;gg++){var v=mn+(mx-mn)*gg/3;var yy=py(v);x.beginPath();x.moveTo(pad.l,yy);x.lineTo(W-pad.r,yy);x.stroke();x.fillText('\u20ac'+Math.round(v/1000)+'k',4,yy+3);}
  var nx=px(WEEK-1); x.strokeStyle='#cbbcae';x.setLineDash([3,3]);x.lineWidth=1;x.beginPath();x.moveTo(nx,pad.t);x.lineTo(nx,H-pad.b);x.stroke();x.setLineDash([]);
  x.fillStyle='#9a8778';x.fillText('nu',nx-6,pad.t+9);
  function line(arr,col,lw,dash){x.strokeStyle=col;x.lineWidth=lw;x.setLineDash(dash||[]);x.beginPath();var st=false;arr.forEach(function(v,i){if(v==null){st=false;return;}var X=px(i),Y=py(v);if(!st){x.moveTo(X,Y);st=true;}else x.lineTo(X,Y);});x.stroke();x.setLineDash([]);}
  line(ly,'#cbbcae',1.6,[]);
  line(bud,'#4b392e',1.8,[5,4]);
  line(proj,'#a67c52',2.4,[5,4]);
  line(act,'#a67c52',2.6,[]);
  x.fillStyle='#9a8778'; var step=Math.max(1,Math.round(wks.length/9));
  wks.forEach(function(w,i){if(i%step===0||i===wks.length-1){x.fillText('wk '+w,px(i)-9,H-5);}});
  document.getElementById('fwdLegend').innerHTML=
    '<span><i style="background:#a67c52"></i>2026 realisatie</span>'
    +'<span><i style="background:#a67c52"></i>2026 verwacht (vorig jaar)</span>'
    +'<span><i style="background:#4b392e"></i>begroting (gefaseerd)</span>'
    +'<span><i style="background:#cbbcae"></i>2025</span>';
}
